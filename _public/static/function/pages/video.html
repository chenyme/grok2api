<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="video.pageTitle">Grok2API - Video 视频生成</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <link href="/static/common/css/common.css?v=1.6.2" rel="stylesheet">
  <link href="/static/function/css/video.css?v=1.6.2" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">
  <div id="toast-container" class="toast-container"></div>
  <div id="app-header"></div>

  <main class="flex-1 container mx-auto max-w-5xl px-6 py-8 fade-in">
    <div class="space-y-6">
      <div class="video-header-row">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight" data-i18n="video.title">Video 视频生成</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm" data-i18n="video.subtitle">浏览器直接发起 Bearer JSON 请求，返回视频 URL 后轮询资源可用性。</p>
        </div>
        <div class="video-actions">
          <button id="startBtn" class="geist-button gap-2">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            <span data-i18n="video.startGenerate">开始生成</span>
          </button>
          <button id="stopBtn" class="geist-button-outline gap-2 hidden">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="5" width="14" height="14" />
            </svg>
            <span data-i18n="common.stop">停止</span>
          </button>
        </div>
      </div>

      <div class="h-px bg-[var(--border)]"></div>

      <div class="video-top-grid">
        <div class="video-card">
          <div class="card-title" data-i18n="video.genSettings">生成设置</div>
          <div class="settings-grid">
            <div class="settings-block prompt-block">
              <label class="field-label" for="promptInput" data-i18n="video.prompt">提示词</label>
              <textarea id="promptInput" class="geist-input video-textarea" placeholder="例如：街头霓虹雨夜，慢镜头，胶片质感" data-i18n-placeholder="video.promptPlaceholder"></textarea>
            </div>
            <div class="settings-block ref-block">
              <label class="field-label" for="imageUrlInput" data-i18n="video.referenceImage">参考图</label>
              <div class="ref-controls">
                <input id="imageUrlInput" class="geist-input" placeholder="https://... 或 data:image/..." data-i18n-placeholder="video.referenceImagePlaceholder">
              </div>
              <div class="ref-meta">
                <span id="imageFileName" class="ref-name" data-i18n="common.noFileSelected">未选择文件</span>
              </div>
            </div>
            <div class="settings-block ratio-block">
              <label class="field-label" for="sizeSelect" data-i18n="video.outputSize">输出尺寸</label>
              <select id="sizeSelect" class="geist-input">
                <option value="1280x720" selected>1280x720</option>
                <option value="720x1280">720x1280</option>
                <option value="1792x1024">1792x1024</option>
                <option value="1024x1792">1024x1792</option>
                <option value="1024x1024">1024x1024</option>
              </select>
            </div>
            <div class="settings-block length-block">
              <label class="field-label" for="secondsInput" data-i18n="video.secondsLabel">时长（秒）</label>
              <input id="secondsInput" class="geist-input" type="number" min="6" max="30" step="1" value="6" />
            </div>
            <div class="settings-block resolution-block">
              <label class="field-label" for="qualitySelect" data-i18n="video.quality">质量</label>
              <select id="qualitySelect" class="geist-input">
                <option value="standard" selected data-i18n="video.qualityStandard">standard</option>
                <option value="high" data-i18n="video.qualityHigh">high</option>
              </select>
            </div>
            <div class="settings-block preset-block">
              <label class="field-label" data-i18n="video.responseMode">返回方式</label>
              <select class="geist-input" disabled>
                <option selected data-i18n="video.responseModeValue">URL + 轮询</option>
              </select>
            </div>
            <div class="settings-block upload-block">
              <label class="field-label">&nbsp;</label>
              <button id="selectImageFileBtn" class="geist-button-outline text-xs px-3" type="button" data-i18n="video.upload">上传</button>
              <input id="imageFileInput" class="ref-file-input" type="file" accept="image/*">
            </div>
            <div class="settings-block clear-block">
              <label class="field-label">&nbsp;</label>
              <button id="clearImageFileBtn" class="geist-button-outline text-xs px-3" type="button" data-i18n="video.clearImage">清除</button>
            </div>
          </div>
        </div>

        <div class="video-card">
          <div class="status-header">
            <div class="card-title" data-i18n="video.requestStatus">请求状态</div>
            <span id="statusText" class="status-text" data-i18n="common.notConnected">未连接</span>
          </div>
          <div class="progress-wrap">
            <div id="progressBar" class="progress-bar">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="progress-meta">
              <span id="progressText">0%</span>
              <span id="durationValue" data-i18n="video.elapsedTimeNone">耗时 -</span>
            </div>
          </div>
          <div class="meta-grid">
            <div class="meta-item">
              <div class="meta-label" data-i18n="video.metaSize">尺寸</div>
              <div id="sizeValue" class="meta-value">-</div>
            </div>
            <div class="meta-item">
              <div class="meta-label" data-i18n="video.metaSeconds">时长</div>
              <div id="secondsValue" class="meta-value">-</div>
            </div>
            <div class="meta-item">
              <div class="meta-label" data-i18n="video.metaQuality">质量</div>
              <div id="qualityValue" class="meta-value">-</div>
            </div>
            <div class="meta-item">
              <div class="meta-label" data-i18n="video.metaReference">参考图</div>
              <div id="referenceValue" class="meta-value" data-i18n="video.referenceNone">无</div>
            </div>
          </div>
        </div>
      </div>

      <div class="video-card video-preview-card">
        <div class="video-preview-header">
          <div class="card-title" data-i18n="video.videoPreview">视频预览</div>
          <div class="preview-actions">
            <button id="clearBtn" class="geist-button-outline text-xs px-3" data-i18n="video.clearPreview">清空</button>
          </div>
        </div>
        <div id="videoEmpty" class="video-empty" data-i18n="video.waitingGenerate">等待发起生成请求</div>
        <div id="videoStage" class="video-stage hidden"></div>
      </div>
    </div>
  </main>

  <div id="app-footer"></div>

  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/common/js/admin-auth.js?v=1.6.2"></script>
  <script src="/static/common/js/function-header.js?v=1.6.2"></script>
  <script src="/static/common/js/footer.js?v=1.6.2"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="/static/function/js/video.js?v=1.6.2"></script>
</body>

</html>
